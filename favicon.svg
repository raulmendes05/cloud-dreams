<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#3a2a78"/>
      <stop offset="55%" stop-color="#1a1636"/>
      <stop offset="100%" stop-color="#0a0c16"/>
    </radialGradient>
    <linearGradient id="cloud1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c3cdec"/>
    </linearGradient>
    <linearGradient id="cloud2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf1ff"/>
      <stop offset="100%" stop-color="#a9b6dd"/>
    </linearGradient>
    <radialGradient id="gloss" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- fundo arredondado -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- nuvem soprada (atrás, à direita) + vento -->
  <g filter="url(#soft)">
    <g fill="url(#cloud2)">
      <ellipse cx="352" cy="238" rx="74" ry="40"/>
      <circle cx="312" cy="226" r="34"/>
      <circle cx="356" cy="200" r="43"/>
      <circle cx="398" cy="224" r="32"/>
    </g>
    <g stroke="#cdd8ff" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M420 210 q46 -10 84 -2" stroke-width="13"/>
      <path d="M424 244 q40 -6 74 2" stroke-width="12"/>
      <path d="M416 276 q34 -2 62 6" stroke-width="11"/>
    </g>
  </g>

  <!-- nuvem principal (frente, à esquerda) -->
  <g filter="url(#soft)" fill="url(#cloud1)">
    <ellipse cx="196" cy="330" rx="104" ry="52"/>
    <circle cx="140" cy="312" r="46"/>
    <circle cx="198" cy="280" r="60"/>
    <circle cx="256" cy="308" r="44"/>
  </g>
</svg>
